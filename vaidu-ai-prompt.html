<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Prompt Forge</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #e8ff47;
    --accent2: #47ffe8;
    --accent3: #ff6b47;
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --radius: 6px;
    --font-mono: 'Space Mono', monospace;
    --font-head: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 300px 1fr 340px;
    grid-template-rows: 56px 1fr;
    grid-template-areas:
      "header header header"
      "sidebar main preview";
  }

  /* HEADER */
  header {
    grid-area: header;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    background: var(--bg);
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    color: var(--accent);
    display: flex; align-items: center; gap: 8px;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    color: #000;
    font-size: 14px;
    font-weight: 800;
  }
  .header-tag {
    font-size: 10px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  /* SIDEBAR */
  aside {
    grid-area: sidebar;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 0;
    background: var(--surface);
  }
  .sidebar-label {
    font-family: var(--font-head);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0 20px 10px;
  }
  .template-btn {
    display: block; width: 100%;
    padding: 10px 20px;
    background: none; border: none;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 12px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    position: relative;
  }
  .template-btn:hover { color: var(--text); background: var(--surface2); }
  .template-btn.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: rgba(232,255,71,0.05);
  }
  .template-btn .t-name {
    display: block;
    font-weight: 700;
    margin-bottom: 2px;
    color: inherit;
  }
  .template-btn .t-desc {
    font-size: 10px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .template-btn.active .t-desc { color: rgba(232,255,71,0.5); }

  /* MAIN */
  main {
    grid-area: main;
    overflow-y: auto;
    padding: 28px;
    background: var(--bg);
  }
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .section-card:focus-within { border-color: var(--accent2); }
  .section-header {
    padding: 12px 16px;
    display: flex; align-items: center; gap-8px; gap: 8px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .section-num {
    width: 20px; height: 20px;
    background: var(--border);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .section-title {
    font-family: var(--font-head);
    font-weight: 600;
    font-size: 13px;
    flex: 1;
    color: var(--text);
  }
  .section-required {
    font-size: 9px;
    color: var(--accent3);
    border: 1px solid var(--accent3);
    padding: 1px 6px; border-radius: 20px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .section-body { padding: 14px 16px; }
  .section-hint { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; line-height: 1.5; }

  /* CHIPS */
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .chip {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    background: var(--surface2);
    transition: all 0.15s;
    user-select: none;
  }
  .chip:hover { border-color: var(--accent2); color: var(--accent2); }
  .chip.selected {
    border-color: var(--accent2);
    background: rgba(71,255,232,0.1);
    color: var(--accent2);
  }

  /* SELECTED TAGS */
  .selected-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .tag {
    display: flex; align-items: center; gap: 4px;
    padding: 3px 8px 3px 10px;
    background: rgba(71,255,232,0.12);
    border: 1px solid var(--accent2);
    border-radius: 20px;
    font-size: 11px;
    color: var(--accent2);
  }
  .tag-remove {
    background: none; border: none; color: var(--accent2);
    cursor: pointer; font-size: 14px; line-height: 1;
    padding: 0; opacity: 0.6;
  }
  .tag-remove:hover { opacity: 1; }

  /* TEXT INPUT */
  .free-input-row { display: flex; gap: 6px; margin-top: 4px; }
  .free-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 10px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .free-input:focus { border-color: var(--accent2); }
  .free-input::placeholder { color: var(--text-muted); }
  .add-btn {
    padding: 7px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .add-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  textarea.section-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    resize: vertical;
    min-height: 80px;
    line-height: 1.6;
    transition: border-color 0.15s;
  }
  textarea.section-textarea:focus { border-color: var(--accent2); }
  textarea.section-textarea::placeholder { color: var(--text-muted); }

  /* PREVIEW */
  .preview-panel {
    grid-area: preview;
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    background: var(--surface);
    position: sticky; top: 56px; height: calc(100vh - 56px);
  }
  .preview-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .preview-title {
    font-family: var(--font-head);
    font-weight: 600;
    font-size: 12px;
    color: var(--text);
    letter-spacing: 0.05em;
  }
  .copy-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #000;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .copy-btn:hover { background: #f5ff80; transform: translateY(-1px); }
  .copy-btn.copied { background: var(--accent2); }
  .preview-body {
    flex: 1; overflow-y: auto;
    padding: 16px;
  }
  #preview-output {
    white-space: pre-wrap;
    font-size: 12px;
    line-height: 1.7;
    color: var(--text);
    word-break: break-word;
  }
  #preview-output .p-section-title {
    color: var(--accent);
    font-weight: 700;
    display: block;
    margin-top: 12px;
    margin-bottom: 2px;
  }
  #preview-output .p-section-title:first-child { margin-top: 0; }
  .preview-empty {
    color: var(--text-muted);
    font-size: 12px;
    line-height: 1.6;
    text-align: center;
    padding: 40px 16px;
  }
  .char-count {
    padding: 8px 16px;
    font-size: 10px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
    flex-shrink: 0;
  }

  /* Template title area */
  .main-header {
    display: flex; align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .template-name {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 22px;
    color: var(--text);
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .template-desc-text {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    line-height: 1.5;
  }
  .clear-btn {
    padding: 7px 14px;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    margin-top: 4px;
  }
  .clear-btn:hover { border-color: var(--accent3); color: var(--accent3); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  .divider { height: 1px; background: var(--border); margin: 8px 0 16px; }

  /* EXAMPLE PROMPT CARD */
  .example-card {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
    margin-top: 8px;
  }
  .example-card-header {
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(232,255,71,0.04);
    border-bottom: 1px dashed var(--border);
    cursor: pointer;
    user-select: none;
  }
  .example-card-header:hover { background: rgba(232,255,71,0.07); }
  .example-label {
    font-family: var(--font-head);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex; align-items: center; gap: 8px;
  }
  .example-label::before {
    content: '✦';
    font-size: 10px;
  }
  .example-toggle {
    font-size: 11px;
    color: var(--text-muted);
    transition: transform 0.2s;
  }
  .example-toggle.open { transform: rotate(180deg); }
  .example-body {
    padding: 14px 16px;
    display: none;
  }
  .example-body.open { display: block; }
  .example-desc {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 10px;
    line-height: 1.5;
    font-style: italic;
  }
  .example-text {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 11px;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    position: relative;
  }
  .example-section-label {
    color: var(--accent);
    font-weight: 700;
    display: block;
    margin-top: 10px;
    margin-bottom: 1px;
    font-size: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .example-section-label:first-child { margin-top: 0; }
  .example-section-value {
    color: var(--text-muted);
    display: block;
    margin-bottom: 2px;
  }
  .use-example-btn {
    margin-top: 12px;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    background: none;
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .use-example-btn:hover { background: rgba(232,255,71,0.1); }

  @media (max-width: 900px) {
    body {
      grid-template-columns: 1fr;
      grid-template-rows: 56px auto 1fr auto;
      grid-template-areas: "header" "sidebar" "main" "preview";
    }
    aside { max-height: 200px; }
    .preview-panel { position: relative; height: auto; min-height: 300px; }
  }
</style>
</head>

    <span id="word-count">0 words</span>

</div>

// ============================================================
// STATE
// ============================================================
let currentTemplate = TEMPLATES[0];
let sectionState = {}; // { sectionId: { tags: [], freeText: '', textarea: '' } }

function initState(template) {
  sectionState = {};
  template.sections.forEach(s => {
    sectionState[s.id] = { tags: [], textarea: '' };
  });
}

// ============================================================
// RENDER SIDEBAR
// ============================================================
function renderSidebar() {
  const el = document.getElementById('sidebar');
  el.innerHTML = `<div class="sidebar-label">Templates</div>` +
    TEMPLATES.map(t => `
      <button class="template-btn ${t.id === currentTemplate.id ? 'active' : ''}" onclick="selectTemplate('${t.id}')">
        <span class="t-name">${t.name}</span>
        <span class="t-desc">${t.desc}</span>
      </button>
    `).join('') +
    `<div style="height:20px"></div>`;
}

// ============================================================
// RENDER MAIN
// ============================================================
function renderMain() {
  const t = currentTemplate;
  const el = document.getElementById('main-content');
  el.innerHTML = `
    <div class="main-header">
      <div>
        <div class="template-name">${t.name}</div>
        <div class="template-desc-text">${t.desc}</div>
      </div>
      <button class="clear-btn" onclick="clearAll()">↺ Clear All</button>
    </div>
    ${t.sections.map((s, i) => renderSection(s, i)).join('')}
    ${renderExampleCard(t)}
  `;
}

function renderSection(s, i) {
  const state = sectionState[s.id];
  const tags = state.tags;

  let body = '';

  if (s.type === 'textarea') {
    body = `
      <div class="section-hint">${s.hint}</div>
      <textarea class="section-textarea" 
        placeholder="${s.placeholder || ''}" 
        oninput="updateTextarea('${s.id}', this.value)"
        rows="4">${state.textarea}</textarea>
    `;
  } else if (s.type === 'chips+free') {
    // Selected tags
    const tagHTML = tags.length > 0 ? `
      <div class="selected-tags" id="tags-${s.id}">
        ${tags.map((tag, ti) => `
          <span class="tag">${tag}<button class="tag-remove" onclick="removeTag('${s.id}', ${ti})">×</button></span>
        `).join('')}
      </div>` : `<div id="tags-${s.id}"></div>`;

    // Chips
    const chipsHTML = s.options.length > 0 ? `
      <div class="chips" id="chips-${s.id}">
        ${s.options.map(opt => `
          <span class="chip ${tags.includes(opt) ? 'selected' : ''}" 
            onclick="toggleChip('${s.id}', '${opt.replace(/'/g,"\\'")}', ${!!s.multi})">
            ${opt}
          </span>
        `).join('')}
      </div>` : '';

    body = `
      <div class="section-hint">${s.hint}</div>
      ${tagHTML}
      ${chipsHTML}
      <div class="free-input-row">
        <input class="free-input" type="text" placeholder="Or type custom value..." 
          id="input-${s.id}"
          onkeydown="handleFreeInput(event, '${s.id}', ${!!s.multi})">
        <button class="add-btn" onclick="addFreeInput('${s.id}', ${!!s.multi})">+ Add</button>
      </div>
    `;
  }

  return `
    <div class="section-card" id="card-${s.id}">
      <div class="section-header">
        <div class="section-num">${i + 1}</div>
        &nbsp;
        <div class="section-title">${s.title}</div>
        ${s.required ? '<span class="section-required">required</span>' : ''}
      </div>
      <div class="section-body">${body}</div>
    </div>
  `;
}

function renderExampleCard(t) {
  if (!t.example) return '';
  const ex = t.example;
  const fieldsHTML = ex.fields.map(f => `
    <span class="example-section-label">${f.label}</span>
    <span class="example-section-value">${f.value.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>
  `).join('');
  return `
    <div class="example-card" id="example-card">
      <div class="example-card-header" onclick="toggleExample()">
        <span class="example-label">Example Prompt</span>
        <span class="example-toggle" id="example-toggle">▾</span>
      </div>
      <div class="example-body" id="example-body">
        <div class="example-desc">${ex.desc}</div>
        <div class="example-text">${fieldsHTML}</div>
        <button class="use-example-btn" onclick="useExample()">↳ Use this example</button>
      </div>
    </div>
  `;
}

function toggleExample() {
  const body = document.getElementById('example-body');
  const toggle = document.getElementById('example-toggle');
  if (!body) return;
  body.classList.toggle('open');
  toggle.classList.toggle('open');
}

function useExample() {
  const t = currentTemplate;
  if (!t.example) return;
  initState(t);
  t.example.fields.forEach(f => {
    // Match field label to section title
    const section = t.sections.find(s => s.title === f.label);
    if (!section) return;
    const state = sectionState[section.id];
    if (section.type === 'textarea') {
      state.textarea = f.value;
    } else {
      // Split comma-separated values into tags
      const vals = f.value.split(',').map(v => v.trim()).filter(Boolean);
      state.tags = vals;
    }
  });
  renderMain();
  updatePreview();
  // Auto-close example card after using
  const body = document.getElementById('example-body');
  const toggle = document.getElementById('example-toggle');
  if (body) { body.classList.remove('open'); toggle.classList.remove('open'); }
}


function selectTemplate(id) {
  currentTemplate = TEMPLATES.find(t => t.id === id);
  initState(currentTemplate);
  renderSidebar();
  renderMain();
  updatePreview();
}

function clearAll() {
  initState(currentTemplate);
  renderMain();
  updatePreview();
}

function toggleChip(sectionId, value, multi) {
  const state = sectionState[sectionId];
  const idx = state.tags.indexOf(value);
  if (idx > -1) {
    state.tags.splice(idx, 1);
  } else {
    if (!multi) state.tags = [value];
    else state.tags.push(value);
  }
  refreshSection(sectionId);
  updatePreview();
}

function removeTag(sectionId, tagIndex) {
  sectionState[sectionId].tags.splice(tagIndex, 1);
  refreshSection(sectionId);
  updatePreview();
}

function handleFreeInput(event, sectionId, multi) {
  if (event.key === 'Enter') addFreeInput(sectionId, multi);
}

function addFreeInput(sectionId, multi) {
  const input = document.getElementById('input-' + sectionId);
  const val = input.value.trim();
  if (!val) return;
  const state = sectionState[sectionId];
  if (!multi) state.tags = [val];
  else if (!state.tags.includes(val)) state.tags.push(val);
  input.value = '';
  refreshSection(sectionId);
  updatePreview();
}

function updateTextarea(sectionId, value) {
  sectionState[sectionId].textarea = value;
  updatePreview();
}

function refreshSection(sectionId) {
  const s = currentTemplate.sections.find(s => s.id === sectionId);
  const i = currentTemplate.sections.indexOf(s);
  const card = document.getElementById('card-' + sectionId);
  const newCard = document.createElement('div');
  newCard.innerHTML = renderSection(s, i);
  card.replaceWith(newCard.firstElementChild);
}

// ============================================================
// PREVIEW GENERATION
// ============================================================
function buildPromptText() {
  const t = currentTemplate;
  let parts = [];

  t.sections.forEach(s => {
    const state = sectionState[s.id];
    let value = '';
    if (s.type === 'textarea') value = state.textarea.trim();
    else value = state.tags.join(', ');

    if (!value) return;

    parts.push({ title: s.title, value });
  });

  if (!parts.length) return '';

  return parts.map(p => `## ${p.title}\n${p.value}`).join('\n\n');
}

function updatePreview() {
  const text = buildPromptText();
  const out = document.getElementById('preview-output');

  if (!text) {
    out.innerHTML = '<div class="preview-empty">← Fill in sections to generate your prompt</div>';
    document.getElementById('char-count').textContent = '0 chars';
    document.getElementById('word-count').textContent = '0 words';
    return;
  }

  // Render with highlighted section titles
  const htmlText = text.replace(/^## (.+)$/gm, (_, title) =>
    `<span class="p-section-title">▸ ${title}</span>`
  );
  out.innerHTML = htmlText;

  const chars = text.length;
  const words = text.trim().split(/\s+/).filter(Boolean).length;
  document.getElementById('char-count').textContent = chars.toLocaleString() + ' chars';
  document.getElementById('word-count').textContent = words.toLocaleString() + ' words';
}

// ============================================================
// COPY
// ============================================================
function copyPrompt() {
  const text = buildPromptText();
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ COPIED!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '⎘ COPY';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// ============================================================
// INIT
// ============================================================
initState(currentTemplate);
renderSidebar();
renderMain();
updatePreview();
</script>
